<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo Card</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f3f4f6;
}

.card{
    width:360px;
    background:#fff;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    position:relative;
}

.close-btn{
    position:absolute;
    top:10px;
    right:10px;
    width:32px;
    height:32px;
    border:none;
    border-radius:50%;
    background:rgba(0,0,0,.7);
    color:#fff;
    cursor:pointer;
    font-size:16px;
}

.banner{
    width:100%;
    display:block;
}

.content{
    padding:20px;
}

.content h2{
    margin-bottom:10px;
}

.content p{
    color:#666;
    margin-bottom:20px;
}

.visit-btn{
    width:100%;
    border:none;
    padding:12px;
    border-radius:10px;
    background:#2563eb;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="card" id="promoCard">

    <button class="close-btn" onclick="closeCard()">✕</button>

    <img
        class="banner"
        src="https://via.placeholder.com/360x220"
        alt="Banner">

    <div class="content">
        <h2>Promo Spesial</h2>
        <p>Klik tombol di bawah untuk mengunjungi halaman tujuan.</p>

        <button class="visit-btn" onclick="visitLink()">
            Kunjungi
        </button>
    </div>

</div>

<script>
const links = [
    "https://pl29784085.effectivecpmnetwork.com/1c/ef/56/1cef56542955c8f71a9aa57f5d19d3fe.js",
    "https://pl29784055.effectivecpmnetwork.com/04/d4/e6/04d4e60cfb315b428083e600e7570e73.js",
];

let currentIndex =
    parseInt(localStorage.getItem("linkIndex")) || 0;

function getNextLink(){
    const link = links[currentIndex];

    currentIndex = (currentIndex + 1) % links.length;

    localStorage.setItem("linkIndex", currentIndex);

    return link;
}

function visitLink(){
    window.open(getNextLink(), "_blank");
}

function closeCard(){
    document.getElementById("promoCard").style.display = "none";
}
</script>

</body>
</html>
