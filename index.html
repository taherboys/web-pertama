<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lanjutkan</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
}

.card{
    width:350px;
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
    position:relative;
}

.close-btn{
    position:absolute;
    top:10px;
    right:10px;
    width:35px;
    height:35px;
    border:none;
    border-radius:50%;
    background:#ff4d4d;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}

.banner{
    width:100%;
    height:200px;
    object-fit:cover;
}

.content{
    padding:20px;
    text-align:center;
}

.content h2{
    margin-bottom:10px;
}

.content p{
    color:#666;
    margin-bottom:20px;
}

.continue-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#007bff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.continue-btn:hover{
    opacity:.9;
}
</style>
</head>
<body>

<div class="card" id="popupCard">

    <button class="close-btn" onclick="closeCard()">✕</button>

    <img
        class="banner"
        src="https://via.placeholder.com/350x200"
        alt="Banner">

    <div class="content">
        <h2>Judul Konten</h2>
        <p>Silakan klik tombol di bawah untuk melanjutkan.</p>

        <button class="continue-btn" onclick="continueAction()">
            Lanjutkan
        </button>
    </div>

</div>

<script>
function closeCard() {
    document.getElementById("popupCard").style.display = "none";
}

function continueAction() {
    window.location.href = "https://example.com";
}
</script>

</body>
</html>
