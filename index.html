<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.card{
    width:380px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
    position:relative;
}

.close-btn{
    position:absolute;
    top:12px;
    right:12px;
    width:40px;
    height:40px;
    border-radius:50%;
    background:#ff4d4d;
    color:white;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    font-weight:bold;
}

.banner{
    width:100%;
    height:220px;
    object-fit:cover;
}

.content{
    padding:25px;
    text-align:center;
}

.content h2{
    margin-bottom:10px;
    color:#333;
}

.content p{
    color:#666;
    line-height:1.5;
}
</style>
</head>
<body>

<div class="card">

    <a href="https://www.effectivecpmnetwork.com/qnvyger95?key=eb2f6a4745dd0ed784bbdb41c4ea6ade" class="close-btn">
        ✕
    </a>

    <img
        class="banner"
        src="https://via.placeholder.com/380x220"
        alt="Banner">

    <div class="content">
        <h2>Selamat Datang</h2>
        <p>Klik tombol X untuk melanjutkan ke halaman tujuan.</p>
    </div>

</div>

<!-- Script iklan dipasang normal sesuai penyedia -->
<script src="https://pl29784055.effectivecpmnetwork.com/04/d4/e6/04d4e60cfb315b428083e600e7570e73.js"></script>

</body>
</html>
