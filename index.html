<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Link</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card" id="promoCard">
        <button class="close-btn" onclick="closeCard()">✕</button>

        <img src="https://via.placeholder.com/300x180" alt="Gambar">

        <div class="content">
            <h2>Judul Konten</h2>
            <p>Deskripsi singkat konten atau promosi.</p>

            <a href="https://example.com" target="_blank" class="btn">
                Kunjungi
            </a>
        </div>
    </div>

    <script>
        function closeCard() {
            document.getElementById("promoCard").style.display = "none";
        }
    </script>

</body>
</html>
